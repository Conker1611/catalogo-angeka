<!DOCTYPE html>

    <!-- ESTA LÍNEA ES LA QUE HACE QUE EL CELULAR NO TE OBLIGUE A HACER ZOOM -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogos de Angeka</title>

    <style>
        /* Fondo de video que cubre todo */
        #fondo-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        /* Contenedor que ocupa casi todo el alto del celular */
        .contenido {
            width: 85%;
            max-width: 400px;
            padding: 40px 20px; /* Más espacio arriba y abajo */
            text-align: center;
            color: white;
            /* Si quieres el fondo sutil de la referencia, descomenta la siguiente línea: */
            /* background: rgba(0, 0, 0, 0.4); border-radius: 20px; */
        }

        h1 { font-size: 24px; margin-bottom: 5px; }
        p { font-size: 14px; margin-bottom: 25px; opacity: 0.9; }

        /* Botones estilo píldora */
        .contenido a {
            display: block;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            text-decoration: none;
            padding: 18px; /* Botones más altos */
            margin-bottom: 15px; /* Más espacio entre ellos */
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
